    <style rel="stylesheet" crossorigin>:root{--bg: #0f1720;--panel: #1b2531;--text: #e6edf3;--muted: #8b98a5;--success: #3fb950;--warning: #d29922;--error: #f85149;--accent: #2f81f7}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text)}.app{max-width:720px;margin:0 auto;padding:2rem 1.25rem 4rem}.app__header h1{margin:0;font-size:1.8rem}.app__subtitle{margin:.25rem 0 1.5rem;color:var(--muted)}.banner{background:var(--panel);border-left:4px solid var(--warning);padding:.75rem 1rem;border-radius:6px;margin-bottom:1rem}.banner--hidden{display:none}.controls{display:flex;gap:.75rem;margin-bottom:1.5rem}.btn{cursor:pointer;border:none;border-radius:8px;padding:.7rem 1.2rem;font-size:1rem;font-weight:600;color:#fff;transition:opacity .15s ease}.btn:disabled{opacity:.4;cursor:not-allowed}.btn--start{background:var(--success)}.btn--stop{background:var(--error)}.status{background:var(--panel);border-radius:10px;padding:1rem 1.25rem;margin-bottom:1.5rem}.status__row{display:flex;justify-content:space-between;padding:.4rem 0;border-bottom:1px solid rgba(255,255,255,.06)}.status__row:last-child{border-bottom:none}.status__label{color:var(--muted)}.status__value{font-variant-numeric:tabular-nums;font-weight:600}.logs h2{font-size:1.1rem}.log-list{list-style:none;margin:0;padding:0;max-height:320px;overflow-y:auto;font-family:ui-monospace,SF Mono,Menlo,Consolas,monospace;font-size:.82rem}.log-list li{padding:.35rem .5rem;border-bottom:1px solid rgba(255,255,255,.05);white-space:pre-wrap;word-break:break-word}.log--success{color:var(--success)}.log--warning{color:var(--warning)}.log--error{color:var(--error)}.log__meta{color:var(--muted);font-size:.72rem}</style>
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <h1>ChunkManager</h1>
        <p class="app__subtitle">Fault-tolerant screen recording &amp; chunked upload</p>
      </header>

      <section id="recovery-banner" class="banner banner--hidden" role="status"></section>

      <section class="controls">
        <button id="start-btn" class="btn btn--start" type="button">● Start recording</button>
        <button id="stop-btn" class="btn btn--stop" type="button" disabled>■ Stop</button>
      </section>

      <section class="status">
        <div class="status__row">
          <span class="status__label">State</span>
          <span id="state" class="status__value">idle</span>
        </div>
        <div class="status__row">
          <span class="status__label">Session</span>
          <span id="session-id" class="status__value">—</span>
        </div>
        <div class="status__row">
          <span class="status__label">Chunks recorded</span>
          <span id="chunk-count" class="status__value">0</span>
        </div>
        <div class="status__row">
          <span class="status__label">Pending upload</span>
          <span id="pending-count" class="status__value">0</span>
        </div>
        <div class="status__row">
          <span class="status__label">Uploaded</span>
          <span id="uploaded-count" class="status__value">0</span>
        </div>
        <div class="status__row">
          <span class="status__label">Network</span>
          <span id="network" class="status__value">online</span>
        </div>
      </section>

      <section class="logs">
        <h2>Logs</h2>
        <ul id="log" class="log-list"></ul>
      </section>
    </main>

  </body>
</html>
